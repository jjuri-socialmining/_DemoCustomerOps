# Publishes the contents of web/ to GitHub Pages.
# Runs on pushes that touch web/ or this workflow, and can also be triggered manually.
name: Deploy web/ to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch: {}

# Minimum permissions required to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Avoid two deploys racing each other; let the latest push win.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      # Only the web/ folder is published — everything else in the repo stays private to the source tree.
      - name: Upload web/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
